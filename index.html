<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador No Entregados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 700px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            max-width: 120px;
            height: auto;
            border-radius: 8px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .status {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .status.ready {
            color: #51cf66;
            font-weight: bold;
        }
        
        .results {
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 16px;
        }
        
        /* RIESGO BAJO - 0 intentos (no mostrado) */
        
        /* RIESGO MEDIO - 1 intento */
        .risk-medium {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe69c 100%);
            border: 3px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .risk-medium .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .risk-medium h2 {
            color: #856404;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .risk-medium p {
            color: #856404;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        /* RIESGO ALTO - 2+ intentos */
        .risk-high {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border: 3px solid #dc3545;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .risk-high .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .risk-high h2 {
            color: #721c24;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .risk-high p {
            color: #721c24;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        .result-header {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }
        
        .result-header h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .result-header p {
            color: #666;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .frequency-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .frequency-badge.medium {
            background: #ffc107;
            color: #856404;
        }
        
        .frequency-badge.high {
            background: #dc3545;
            color: white;
        }
        
        .attempts {
            margin-top: 20px;
        }
        
        .attempts h4 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .attempt-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            color: #555;
        }
        
        .attempt-item .date {
            font-weight: bold;
            color: #333;
        }
        
        .attempt-item .store {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #667eea;
            color: white;
        }
        
        .attempt-item .store.voladoz {
            background: #ff9800;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGO DE TU APP -->
        <div class="logo">
            <img src="https://forstoressv-alt.github.io/no-entregados/logo.png" alt="FORSTORE Logo" onerror="this.style.display='none'">
        </div>
        
        <div class="header">
            <h1>🔍 Verificador No Entregados En El Salvador</h1>
            <p>Verifica antes de enviar</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchPhone" 
                    placeholder="Ingresa teléfono (ej: 76340225)"
                    autocomplete="off"
                >
            </div>
            <div class="status" id="status">Cargando datos...</div>
        </div>
        
        <div class="results" id="results">
            <div class="no-results">Ingresa un teléfono para buscar</div>
        </div>
        
        <div class="footer">
            <p>Actualizado: <span id="lastUpdate">-</span></p>
            <p>Total registros: <span id="totalRecords">-</span></p>
        </div>
    </div>

    <script>
        let allData = [];
        
        const SHEET_ID = "1wWj1Cww4siCIj1aLDZj4teZfvxfAayY6ZnKXuhM_Ri8"; // Reemplaza aquí
        
        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
                const response = await fetch(url);
                const csv = await response.text();
                const lines = csv.split('\n').slice(1);
                
                allData = lines
                    .filter(line => line.trim())
                    .map(line => {
                        const parts = line.split(',');
                        return {
                            telefono: parts[0]?.trim().replace(/"/g, '') || '',
                            nombre: parts[1]?.trim().replace(/"/g, '') || '',
                            fecha: parts[2]?.trim().replace(/"/g, '') || '',
                            tienda: parts[3]?.trim().replace(/"/g, '') || ''
                        };
                    })
                    .filter(item => item.telefono);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('es-SV');
                document.getElementById('totalRecords').textContent = allData.length;
                document.getElementById('status').textContent = `✓ Listo - ${allData.length} registros`;
                document.getElementById('status').className = 'status ready';
                
            } catch (error) {
                document.getElementById('status').textContent = '✗ Error';
            }
        }
        
        document.getElementById('searchPhone').addEventListener('keyup', (e) => {
            const query = e.target.value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">Ingresa un teléfono para buscar</div>';
                return;
            }
            
            const matches = allData.filter(item => item.telefono === query);
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 48px; margin-bottom: 15px;">✅</div>
                        <h3 style="color: #51cf66; font-size: 20px; margin-bottom: 10px;">Cliente Seguro</h3>
                        <p style="color: #666;">No está en lista negra</p>
                        <p style="color: #999; font-size: 12px; margin-top: 10px;">Puedes proceder con el envío</p>
                    </div>
                `;
                return;
            }
            
            const frecuencia = matches.length;
            const sorted = matches.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            const cliente = matches[0];
            
            // RIESGO MEDIO - 1 intento
            let riskHTML = '';
            if (frecuencia === 1) {
                riskHTML = `
                    <div class="risk-medium">
                        <div class="icon">⚠️</div>
                        <h2>RIESGO MEDIO</h2>
                        <p>1 intento fallido anterior</p>
                        <p style="font-size: 12px; margin: 10px 0;">Verifica domicilio antes de enviar</p>
                    </div>
                `;
            }
            // RIESGO ALTO - 2+ intentos
            else if (frecuencia >= 2) {
                riskHTML = `
                    <div class="risk-high">
                        <div class="icon">🚨</div>
                        <h2>RIESGO ALTO</h2>
                        <p>${frecuencia} intentos fallidos</p>
                        <p style="font-size: 12px; margin: 10px 0; color: #721c24;">⛔ NO RECOMENDADO - Verifica con cliente primero</p>
                    </div>
                `;
            }
            
            let html = riskHTML + `
                <div class="result-header">
                    <h3>👤 ${cliente.nombre}</h3>
                    <p><strong>☎️ Teléfono:</strong> ${cliente.telefono}</p>
                    <p><strong>🏪 Tienda:</strong> ${cliente.tienda}</p>
                    <div class="frequency-badge ${frecuencia === 1 ? 'medium' : 'high'}">
                        ${frecuencia} intento${frecuencia > 1 ? 's' : ''} fallido${frecuencia > 1 ? 's' : ''}
                    </div>
                </div>
                
                <div class="attempts">
                    <h4>📋 Historial de entregas fallidas:</h4>
                    ${sorted.map((item, i) => `
                        <div class="attempt-item">
                            <span class="date">#${i + 1}</span> 📅 ${item.fecha}
                            <span class="store ${item.tienda === 'Forstore' ? '' : 'voladoz'}">
                                🏢 ${item.tienda}
                            </span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            resultsDiv.innerHTML = html;
        });
        
        loadData();
    </script>
</body>
</html>
