<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador No Entregados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 700px;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo img {
            max-width: 120px;
            height: auto;
            border-radius: 8px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-btn:hover {
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .status {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .status.ready {
            color: #51cf66;
            font-weight: bold;
        }
        
        .upload-section {
            margin-bottom: 30px;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: block;
            padding: 15px;
            background: #f0f4ff;
            border: 2px dashed #667eea;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-label:hover {
            background: #e8f0ff;
            border-color: #764ba2;
        }
        
        .file-label span {
            color: #667eea;
            font-weight: bold;
        }
        
        .file-info {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .progress-container {
            display: none;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .progress-text {
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .upload-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .upload-btn:hover {
            background: #764ba2;
        }
        
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .results {
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 16px;
        }
        
        .risk-medium {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe69c 100%);
            border: 3px solid #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .risk-medium .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .risk-medium h2 {
            color: #856404;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .risk-medium p {
            color: #856404;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .risk-high {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            border: 3px solid #dc3545;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .risk-high .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .risk-high h2 {
            color: #721c24;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .risk-high p {
            color: #721c24;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        
        .result-header {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }
        
        .result-header h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .result-header h4 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .result-header p {
            color: #666;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .frequency-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .frequency-badge.medium {
            background: #ffc107;
            color: #856404;
        }
        
        .frequency-badge.high {
            background: #dc3545;
            color: white;
        }
        
        .attempts {
            margin-top: 20px;
        }
        
        .attempts h4 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .attempt-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            color: #555;
        }
        
        .attempt-item .date {
            font-weight: bold;
            color: #333;
        }
        
        .attempt-item .store {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #667eea;
            color: white;
        }
        
        .attempt-item .store.voladoz {
            background: #ff9800;
        }
        
        .summary-stats {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }
        
        .stat-value.danger {
            color: #dc3545;
        }
        
        .stat-value.warning {
            color: #ffc107;
        }
        
        .download-btn {
            width: 100%;
            padding: 12px;
            background: #51cf66;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            background: #40c057;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://forstoressv-alt.github.io/no-entregados/logo.png" alt="FORSTORE Logo" onerror="this.style.display='none'">
        </div>
        
        <div class="header">
            <h1>🔍 Verificador No Entregados En El Salvador</h1>
            <p>Verifica antes de enviar</p>
        </div>
        
        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('individual')">
                🔎 Búsqueda Individual
            </button>
            <button class="tab-btn" onclick="switchTab('batch')">
                📤 Verificar Lote
            </button>
        </div>
        
        <!-- TAB 1: BÚSQUEDA INDIVIDUAL -->
        <div id="individual" class="tab-content active">
            <div class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchPhone" 
                        placeholder="Ingresa teléfono (ej: 76340225)"
                        autocomplete="off"
                    >
                </div>
                <div class="status" id="status">Cargando datos...</div>
            </div>
            
            <div class="results" id="results">
                <div class="no-results">Ingresa un teléfono para buscar</div>
            </div>
        </div>
        
        <!-- TAB 2: VERIFICAR LOTE -->
        <div id="batch" class="tab-content">
            <div class="upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".txt,.csv">
                    <label for="fileInput" class="file-label">
                        <span>📁 Sube un archivo (TXT o CSV)</span>
                        <div class="file-info">Cada número en una línea nueva</div>
                    </label>
                </div>
                
                <!-- BARRA DE PROGRESO -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">Procesando...</div>
                </div>
                
                <button class="upload-btn" id="uploadBtn" onclick="processFile()">
                    🚀 Verificar Números
                </button>
            </div>
            
            <div class="results" id="batchResults">
                <div class="no-results">Sube un archivo para comenzar</div>
            </div>
        </div>
        
        <div class="footer">
            <p>Actualizado: <span id="lastUpdate">-</span></p>
            <p>Total registros: <span id="totalRecords">-</span></p>
        </div>
    </div>

    <script>
        let allData = [];
        const SHEET_ID = "1wWj1Cww4siCIj1aLDZj4teZfvxfAayY6ZnKXuhM_Ri8"; // Reemplaza aquí
        
        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
                const response = await fetch(url);
                const csv = await response.text();
                const lines = csv.split('\n').slice(1);
                
                allData = lines
                    .filter(line => line.trim())
                    .map(line => {
                        const parts = line.split(',');
                        return {
                            telefono: parts[0]?.trim().replace(/"/g, '') || '',
                            nombre: parts[1]?.trim().replace(/"/g, '') || '',
                            fecha: parts[2]?.trim().replace(/"/g, '') || '',
                            tienda: parts[3]?.trim().replace(/"/g, '') || ''
                        };
                    })
                    .filter(item => item.telefono);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('es-SV');
                document.getElementById('totalRecords').textContent = allData.length;
                document.getElementById('status').textContent = `✓ Listo - ${allData.length} registros`;
                document.getElementById('status').className = 'status ready';
                
            } catch (error) {
                document.getElementById('status').textContent = '✗ Error';
            }
        }
        
        // CAMBIAR TABS
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        // BÚSQUEDA INDIVIDUAL
        document.getElementById('searchPhone').addEventListener('keyup', (e) => {
            const query = e.target.value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">Ingresa un teléfono para buscar</div>';
                return;
            }
            
            const matches = allData.filter(item => item.telefono === query);
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <div style="font-size: 48px; margin-bottom: 15px;">✅</div>
                        <h3 style="color: #51cf66; font-size: 20px; margin-bottom: 10px;">Cliente Seguro</h3>
                        <p style="color: #666;">No está en lista negra</p>
                    </div>
                `;
                return;
            }
            
            const frecuencia = matches.length;
            const sorted = matches.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            const cliente = matches[0];
            
            let riskHTML = '';
            if (frecuencia === 1) {
                riskHTML = `
                    <div class="risk-medium">
                        <div class="icon">⚠️</div>
                        <h2>RIESGO MEDIO</h2>
                        <p>1 intento fallido anterior</p>
                    </div>
                `;
            } else if (frecuencia >= 2) {
                riskHTML = `
                    <div class="risk-high">
                        <div class="icon">🚨</div>
                        <h2>RIESGO ALTO</h2>
                        <p>${frecuencia} intentos fallidos</p>
                    </div>
                `;
            }
            
            let html = riskHTML + `
                <div class="result-header">
                    <h3>👤 ${cliente.nombre}</h3>
                    <p><strong>☎️ Teléfono:</strong> ${cliente.telefono}</p>
                    <p><strong>🏪 Tienda:</strong> ${cliente.tienda}</p>
                    <div class="frequency-badge ${frecuencia === 1 ? 'medium' : 'high'}">
                        ${frecuencia} intento${frecuencia > 1 ? 's' : ''} fallido${frecuencia > 1 ? 's' : ''}
                    </div>
                </div>
                <div class="attempts">
                    <h4>📋 Historial:</h4>
                    ${sorted.map((item, i) => `
                        <div class="attempt-item">
                            <span class="date">#${i + 1}</span> 📅 ${item.fecha}
                            <span class="store ${item.tienda === 'Forstore' ? '' : 'voladoz'}">🏢 ${item.tienda}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            resultsDiv.innerHTML = html;
        });
        
        // PROCESAR ARCHIVO CON BARRA DE PROGRESO
        function processFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Por favor sube un archivo');
                return;
            }
            
            // Mostrar barra de progreso
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const uploadBtn = document.getElementById('uploadBtn');
            
            progressContainer.style.display = 'block';
            uploadBtn.disabled = true;
            progressFill.style.width = '10%';
            progressText.textContent = 'Leyendo archivo...';
            
            const reader = new FileReader();
            reader.onload = (e) => {
                progressFill.style.width = '30%';
                progressText.textContent = 'Extrayendo números...';
                
                const content = e.target.result;
                const phonesFromFile = content
                    .split('\n')
                    .map(line => line.trim().replace(/[^\d]/g, ''))
                    .filter(phone => phone.length >= 7);
                
                progressFill.style.width = '50%';
                progressText.textContent = 'Comparando con base de datos...';
                
                // Procesar matches
                const resultados = {
                    total: phonesFromFile.length,
                    encontrados: 0,
                    noEncontrados: 0,
                    riesgoAlto: 0,
                    riesgoMedio: 0,
                    matches: []
                };
                
                phonesFromFile.forEach((phone, index) => {
                    const matches = allData.filter(item => item.telefono === phone);
                    
                    if (matches.length === 0) {
                        resultados.noEncontrados++;
                    } else {
                        resultados.encontrados++;
                        if (matches.length >= 2) {
                            resultados.riesgoAlto++;
                        } else {
                            resultados.riesgoMedio++;
                        }
                        resultados.matches.push({
                            telefono: phone,
                            nombre: matches[0].nombre,
                            tienda: matches[0].tienda,
                            intentos: matches.length,
                            riesgo: matches.length >= 2 ? 'alto' : 'medio'
                        });
                    }
                    
                    // Actualizar progreso
                    const progreso = 50 + (index / phonesFromFile.length) * 50;
                    progressFill.style.width = progreso + '%';
                });
                
                progressFill.style.width = '100%';
                progressText.textContent = '✓ Verificación completada';
                
                // Ocultar barra después de 1.5 segundos
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    uploadBtn.disabled = false;
                    progressFill.style.width = '0%';
                }, 1500);
                
                // Mostrar resultados
                let html = `
                    <div class="summary-stats">
                        <h3 style="margin-bottom: 15px; color: #333;">📊 Resumen de Verificación</h3>
                        <div class="stat-row">
                            <span class="stat-label">Total números procesados:</span>
                            <span class="stat-value">${resultados.total}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Encontrados en lista negra:</span>
                            <span class="stat-value danger">${resultados.encontrados}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">No encontrados (seguros):</span>
                            <span class="stat-value" style="color: #51cf66;">${resultados.noEncontrados}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Riesgo Alto:</span>
                            <span class="stat-value danger">${resultados.riesgoAlto}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Riesgo Medio:</span>
                            <span class="stat-value warning">${resultados.riesgoMedio}</span>
                        </div>
                    </div>
                    
                    <h3 style="color: #333; margin-bottom: 15px; margin-top: 20px;">⚠️ Números en Lista Negra:</h3>
                `;
                
                if (resultados.matches.length === 0) {
                    html += '<div class="no-results">✅ Todos los números son seguros</div>';
                } else {
                    html += resultados.matches.map(match => `
                        <div class="result-header">
                            <h4>👤 ${match.nombre}</h4>
                            <p><strong>☎️:</strong> ${match.telefono}</p>
                            <p><strong>🏪:</strong> ${match.tienda}</p>
                            <div class="frequency-badge ${match.riesgo === 'alto' ? 'high' : 'medium'}">
                                ${match.intentos} intento${match.intentos > 1 ? 's' : ''} fallido${match.intentos > 1 ? 's' : ''}
                            </div>
                        </div>
                    `).join('');
                    
                    html += `
                        <button class="download-btn" onclick="descargarResultados(${JSON.stringify(resultados).replace(/"/g, '&quot;')})">
                            📥 Descargar Resultados (CSV)
                        </button>
                    `;
                }
                
                document.getElementById('batchResults').innerHTML = html;
            };
            
            reader.readAsText(file);
        }
        
        // DESCARGAR RESULTADOS
        function descargarResultados(resultados) {
            let csv = 'Teléfono,Nombre,Tienda,Intentos Fallidos,Riesgo\n';
            
            resultados.matches.forEach(m => {
                csv += `${m.telefono},${m.nombre},${m.tienda},${m.intentos},${m.riesgo.toUpperCase()}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `verificacion-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // Cargar datos al iniciar
        loadData();
    </script>
</body>
</html>
