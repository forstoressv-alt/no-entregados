<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador No Entregados - FORSTORE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 700px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .status {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .status.loading {
            color: #667eea;
            font-weight: bold;
        }
        
        .status.ready {
            color: #51cf66;
            font-weight: bold;
        }
        
        .results {
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 16px;
        }
        
        .result-header {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }
        
        .result-header h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .result-header p {
            color: #666;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .frequency-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .frequency-badge.high {
            background: #ff6b6b;
        }
        
        .frequency-badge.medium {
            background: #ffa94d;
        }
        
        .attempts {
            margin-top: 20px;
        }
        
        .attempts h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .attempt-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            color: #555;
        }
        
        .attempt-item .date {
            font-weight: bold;
            color: #333;
        }
        
        .attempt-item .store {
            display: inline-block;
            margin-left: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #667eea;
            color: white;
        }
        
        .attempt-item .store.voladoz {
            background: #ff9800;
        }
        
        .warning {
            background: #fff5f5;
            border: 2px solid #ff6b6b;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Verificador No Entregados</h1>
            <p>FORSTORE - Busca un teléfono para ver historial de entregas fallidas</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchPhone" 
                    placeholder="Ingresa teléfono (ej: 76340225)"
                    autocomplete="off"
                >
            </div>
            <div class="status" id="status">Cargando datos...</div>
        </div>
        
        <div class="results" id="results">
            <div class="no-results">Ingresa un teléfono para buscar</div>
        </div>
        
        <div class="footer">
            <p>Datos actualizados: <span id="lastUpdate">-</span></p>
            <p>Total registros: <span id="totalRecords">-</span></p>
        </div>
    </div>

    <script>
        let allData = [];
        
        // ===== CONFIGURA AQUÍ =====
        const SHEET_ID = "1wWj1Cww4siCIj1aLDZj4teZfvxfAayY6ZnKXuhM_Ri8"; // Reemplaza con tu Sheet ID
        const API_KEY = "AIzaSyA0F2SzYBsA6XkfyVobjwvLyRiJdlHPeF0"; // Reemplaza con tu API Key
        // =========================
        
        const SHEET_NAME = "shipments_detalle";
        
        async function loadDataFromSheets() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: Verifica tu Sheet ID y API Key`);
                }
                
                const data = await response.json();
                
                if (data.values && data.values.length > 1) {
                    allData = data.values.slice(1).map(row => ({
                        telefono: row[0] || '',
                        nombre: row[1] || '',
                        fecha: row[2] || '',
                        tienda: row[3] || '',
                        id_unico: row[4] || ''
                    })).filter(item => item.telefono); // Filtrar vacíos
                    
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleString('es-SV');
                    document.getElementById('totalRecords').textContent = allData.length;
                    document.getElementById('status').textContent = `✓ Listo - ${allData.length} registros cargados`;
                    document.getElementById('status').className = 'status ready';
                    
                    console.log(`✓ Cargados ${allData.length} registros`);
                } else {
                    throw new Error('No se encontraron datos en la hoja');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').textContent = '✗ Error al cargar datos';
                document.getElementById('status').className = 'status';
                document.getElementById('results').innerHTML = 
                    '<div class="no-results">⚠️ Error: ' + error.message + '</div>';
            }
        }
        
        document.getElementById('searchPhone').addEventListener('keyup', (e) => {
            const query = e.target.value.trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">Ingresa un teléfono para buscar</div>';
                return;
            }
            
            // Buscar coincidencias exactas
            const matches = allData.filter(item => item.telefono === query);
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = `<div class="no-results">✓ No encontrado en lista negra<br><small>Puedes proceder con el envío</small></div>`;
                return;
            }
            
            // Agrupar por cliente (por nombre)
            const clienteInfo = matches[0];
            const frecuencia = matches.length;
            
            // Determinar color de alerta
            let badgeClass = '';
            let warning = '';
            if (frecuencia >= 3) {
                badgeClass = 'high';
                warning = '<div class="warning">⚠️ CLIENTE DE ALTO RIESGO - MÚLTIPLES INTENTOS FALLIDOS</div>';
            } else if (frecuencia >= 2) {
                badgeClass = 'medium';
                warning = '<div class="warning">⚠️ CLIENTE CON HISTORIAL - VERIFICAR ANTES DE ENVIAR</div>';
            }
            
            // Ordenar intentos por fecha (más recientes primero)
            const intentosOrdenados = matches
                .sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            
            let html = warning + `
                <div class="result-header">
                    <h2>${clienteInfo.nombre}</h2>
                    <p><strong>Teléfono:</strong> ${clienteInfo.telefono}</p>
                    <p><strong>Tienda:</strong> ${clienteInfo.tienda}</p>
                    <div class="frequency-badge ${badgeClass}">
                        ${frecuencia} intento${frecuencia > 1 ? 's' : ''} fallido${frecuencia > 1 ? 's' : ''}
                    </div>
                </div>
                
                <div class="attempts">
                    <h3>Historial de entregas fallidas:</h3>
                    ${intentosOrdenados.map((item, index) => `
                        <div class="attempt-item">
                            <span class="date">#${index + 1}</span> ${item.fecha}
                            <span class="store ${item.tienda === 'Forstore' ? '' : 'voladoz'}">
                                ${item.tienda}
                            </span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            resultsDiv.innerHTML = html;
        });
        
        // Cargar datos al iniciar
        loadDataFromSheets();
    </script>
</body>
</html>
